services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agenttutor
      POSTGRES_USER: agenttutor
      POSTGRES_PASSWORD: agenttutor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttutor -d agenttutor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ../backend
    environment: &backend_environment
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://agenttutor:agenttutor@postgres:5432/agenttutor
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-deploying}
      FRONTEND_URL: http://localhost:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen3:4b}
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ../backend
    environment: *backend_environment
    command: ["python", "-m", "app.workers.main"]
    depends_on:
      api:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
